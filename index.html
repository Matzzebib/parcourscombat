<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parcours du Combattant — Classement</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root {
    --bg: #0a0a08;
    --surface: #111110;
    --card: #181815;
    --border: #2a2a26;
    --olive: #8a9a2a;
    --olive-bright: #b8cc2e;
    --orange: #e85d00;
    --orange-light: #ff7a1a;
    --cream: #f0ead8;
    --muted: #6b6b60;
    --gold: #d4a017;
    --silver: #9ba0a8;
    --bronze: #b06830;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--olive-bright);
    line-height: 1;
  }

  .nav-logo span { color: var(--orange); }

  .nav-tabs {
    display: flex;
    gap: 4px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px;
  }

  .nav-tab {
    padding: 8px 20px;
    border-radius: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }

  .nav-tab.active {
    background: var(--olive);
    color: var(--bg);
  }

  .nav-tab:hover:not(.active) {
    color: var(--cream);
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    letter-spacing: 2px;
    font-weight: 600;
    color: var(--orange);
    text-transform: uppercase;
  }

  .live-dot {
    width: 8px;
    height: 8px;
    background: var(--orange);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .page { display: none; }
  .page.active { display: block; }

  .hero {
    padding: 48px 32px 32px;
  }

  .leaderboard {
    padding: 0 32px 48px;
  }

  .results-table td, .results-table th {
    padding: 14px 16px;
  }

  .admin-page {
    max-width: 600px;
    margin: 0 auto;
    padding: 40px 32px;
  }

  .form-input {
    width: 100%;
    padding: 14px 16px;
    margin-bottom: 20px;
  }

  .chrono-display {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    margin-bottom: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 48px;
    font-weight: 500;
    color: var(--olive-bright);
  }

  .btn {
    padding: 14px 20px;
    border-radius: 6px;
    cursor: pointer;
  }

</style>
</head>

<body>

<nav>
  <div class="nav-logo">PARCOURS<span>.</span>COMBAT</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('classement')">Classement</button>
    <button class="nav-tab" onclick="showPage('profil')">Profil</button>
    <button class="nav-tab" onclick="showPage('admin')">Admin</button>
  </div>
  <div class="live-badge">
    <div class="live-dot"></div>
    Live
  </div>
</nav>

<!-- CLASSEMENT -->
<div class="page active" id="page-classement">
  <div class="hero">
    <h1>Classement Général</h1>
  </div>

  <div class="leaderboard">
    <table class="results-table">
      <tbody id="rankingBody"></tbody>
    </table>
  </div>
</div>

<!-- PROFIL -->
<div class="page" id="page-profil">
  <h2 style="padding:20px;">Profil</h2>
</div>

<!-- ADMIN -->
<div class="page" id="page-admin">

  <div class="admin-page">

    <input class="form-input" id="adminName" placeholder="Nom du participant">

    <div class="chrono-display" id="chronoDisplay">00:00.0</div>

    <button class="btn" onclick="startChrono()">Démarrer</button>
    <button class="btn" onclick="stopChrono()">Stop</button>
    <button class="btn" onclick="saveEntry()">Enregistrer</button>

    <div id="recentList"></div>

  </div>

</div>

<script>

/* ================= SUPABASE ================= */

const SUPABASE_URL = "https://bbeucermbrdofffsbpsz.supabase.co";

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJiZXVjZXJtYnJkb2ZmZnNicHN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDMwMTQsImV4cCI6MjA5MTY3OTAxNH0.KcKrZvmnHfzglk7uQjcqNyNvHQbrYP4NTT46sLo_4aw";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ================= NAV ================= */

function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
}

/* ================= CHRONO ================= */

let chronoInterval;
let chronoMs = 0;
let running = false;

function format(ms){
  let m=Math.floor(ms/60000);
  let s=Math.floor(ms%60000/1000);
  let d=Math.floor(ms%1000/100);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${d}`;
}

function startChrono(){
  if(running) return;
  running = true;
  const start = Date.now() - chronoMs;

  chronoInterval = setInterval(()=>{
    chronoMs = Date.now() - start;
    document.getElementById("chronoDisplay").textContent = format(chronoMs);
  },100);
}

function stopChrono(){
  running = false;
  clearInterval(chronoInterval);
}

/* ================= SAVE ================= */

async function saveEntry(){

  const name = document.getElementById("adminName").value || "Anonyme";
  const time = document.getElementById("chronoDisplay").textContent;

  await supabase.from("times").insert([{ name, time }]);

  loadEntries();
  loadRanking();

  chronoMs = 0;
  document.getElementById("chronoDisplay").textContent = "00:00.0";
  document.getElementById("adminName").value = "";
}

/* ================= LOAD RECENT ================= */

async function loadEntries(){

  const { data } = await supabase
    .from("times")
    .select("*")
    .order("created_at", { ascending:false });

  const list = document.getElementById("recentList");
  list.innerHTML = "";

  data.forEach(e=>{
    const div = document.createElement("div");
    div.innerHTML = `<b>${e.name}</b> - ${e.time}`;
    list.appendChild(div);
  });
}

/* ================= LOAD RANKING ================= */

async function loadRanking(){

  const { data } = await supabase
    .from("times")
    .select("*");

  const body = document.getElementById("rankingBody");
  body.innerHTML = "";

  data.forEach((e,i)=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${i+1}</td>
      <td>${e.name}</td>
      <td>${e.time}</td>
    `;
    body.appendChild(tr);
  });
}

/* ================= INIT ================= */

loadEntries();
loadRanking();

</script>

</body>
</html>
