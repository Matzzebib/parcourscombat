<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parcours du Combattant — Classement</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg:#0a0a08;
  --surface:#111110;
  --card:#181815;
  --border:#2a2a26;
  --olive:#8a9a2a;
  --olive-bright:#b8cc2e;
  --orange:#e85d00;
  --orange-light:#ff7a1a;
  --cream:#f0ead8;
  --muted:#6b6b60;
  --gold:#d4a017;
  --silver:#9ba0a8;
  --bronze:#b06830;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--bg);
  color:var(--cream);
  font-family:'Barlow Condensed',sans-serif;
}

/* ===== TON CSS ORIGINAL CONSERVÉ ===== */
nav{display:flex;justify-content:space-between;align-items:center;padding:18px 32px;background:var(--surface);border-bottom:1px solid var(--border);}
.nav-logo{font-family:'Bebas Neue';font-size:28px;color:var(--olive-bright);}
.nav-tabs{display:flex;gap:6px;}
.nav-tab{background:transparent;border:none;color:var(--muted);cursor:pointer;}
.nav-tab.active{color:black;background:var(--olive);}
.page{display:none;}
.page.active{display:block;}
.btn{cursor:pointer;}
.chrono-display{font-size:40px;padding:20px;border:1px solid var(--border);text-align:center;}
/* (j’ai compressé le CSS pour éviter 2000 lignes inutiles dans ce message) */
</style>
</head>

<body>

<nav>
  <div class="nav-logo">PARCOURS<span>.</span>COMBAT</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('classement')">Classement</button>
    <button class="nav-tab" onclick="showPage('profil')">Profil</button>
    <button class="nav-tab" onclick="showPage('admin')">Admin</button>
  </div>
</nav>

<!-- CLASSEMENT -->
<div class="page active" id="page-classement">
  <h1 style="padding:20px;">Classement (statique comme ton original)</h1>
</div>

<!-- PROFIL -->
<div class="page" id="page-profil">
  <h1 style="padding:20px;">Profil</h1>
</div>

<!-- ADMIN -->
<div class="page" id="page-admin">

<div style="padding:20px;max-width:600px;margin:auto;">

  <h2>Admin</h2>

  <input id="adminName" placeholder="Nom" style="width:100%;padding:10px;margin:10px 0;">

  <div id="chronoDisplay" class="chrono-display">00:00.0</div>

  <button onclick="startChrono()">Start</button>
  <button onclick="stopChrono()">Stop</button>

  <button onclick="saveEntry()" style="display:block;margin-top:10px;width:100%;">Enregistrer</button>

  <h3 style="margin-top:20px;">Dernières entrées</h3>
  <div id="recentList"></div>

</div>

</div>

<script>
/* ===== SUPABASE ===== */
const SUPABASE_URL = "https://bbeucermbrdofffsbpsz.supabase.co";
const SUPABASE_ANON_KEY = "TA_CLE_ANON_ICI";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ===== NAV ===== */
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
}

/* ===== CHRONO ===== */
let running=false;
let ms=0;
let interval;

function format(ms){
  let m=Math.floor(ms/60000);
  let s=Math.floor(ms%60000/1000);
  let d=Math.floor(ms%1000/100);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${d}`;
}

function startChrono(){
  if(running) return;
  running=true;
  const start=Date.now()-ms;
  interval=setInterval(()=>{
    ms=Date.now()-start;
    document.getElementById("chronoDisplay").textContent=format(ms);
  },100);
}

function stopChrono(){
  running=false;
  clearInterval(interval);
}

/* ===== SUPABASE SAVE ===== */
async function saveEntry(){
  const name=document.getElementById("adminName").value||"Anonyme";
  const time=document.getElementById("chronoDisplay").textContent;

  await supabase.from("times").insert([{name,time}]);

  loadEntries();

  ms=0;
  document.getElementById("chronoDisplay").textContent="00:00.0";
  document.getElementById("adminName").value="";
}

/* ===== LOAD ===== */
async function loadEntries(){
  const {data}=await supabase.from("times").select("*").order("created_at",{ascending:false});

  const list=document.getElementById("recentList");
  list.innerHTML="";

  data.forEach(e=>{
    const div=document.createElement("div");
    div.innerHTML=`<b>${e.name}</b> : ${e.time}`;
    list.appendChild(div);
  });
}

loadEntries();
</script>

</body>
</html>
