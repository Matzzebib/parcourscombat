<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parcours du Combattant — Classement</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root {
  --bg:#0a0a08;
  --surface:#111110;
  --card:#181815;
  --border:#2a2a26;
  --olive:#8a9a2a;
  --olive-bright:#b8cc2e;
  --orange:#e85d00;
  --cream:#f0ead8;
  --muted:#6b6b60;
}

/* base */
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--cream);font-family:Barlow Condensed}

/* nav */
nav{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:var(--surface);
  position:sticky;
  top:0;
}

.nav-tabs{
  display:flex;
  gap:5px;
  overflow-x:auto;
}

.nav-tab{
  background:none;
  border:1px solid var(--border);
  color:var(--cream);
  padding:8px;
  cursor:pointer;
  white-space:nowrap;
}

/* pages */
.page{display:none;padding:15px}
.page.active{display:block}

/* table */
table{width:100%;margin-top:20px;border-collapse:collapse}
td,th{padding:10px;border-bottom:1px solid var(--border)}

/* admin */
input{
  width:100%;
  padding:10px;
  margin:10px 0;
}

/* chrono */
#chrono{
  font-size:40px;
  text-align:center;
  margin:10px 0;
}
</style>
</head>

<body>

<nav>
  <div><b>PARCOURS</b></div>

  <div class="nav-tabs">
    <button class="nav-tab active" onclick="show('classement',this)">Classement</button>
    <button class="nav-tab" onclick="show('admin',this)">Admin</button>
  </div>
</nav>

<!-- CLASSEMENT -->
<div id="classement" class="page active">
  <h2>Classement</h2>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Pseudo</th>
        <th>Temps</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
  <h2>Admin</h2>

  <input id="pseudo" placeholder="Pseudo">

  <div id="chrono">00:00.0</div>

  <button onclick="start()">Start</button>
  <button onclick="stop()">Stop</button>

  <button onclick="save()">Enregistrer</button>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://bbeucermbrdofffsbpsz.supabase.co",
  "TA_CLE_ANON_ICI"
);

/* NAV */
function show(page,btn){
  if(page==="admin"){
    const pass = prompt("Mot de passe ?");
    if(pass!=="miniac2026") return alert("Accès refusé");
  }

  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");

  document.querySelectorAll(".nav-tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
}

/* CHRONO */
let startTime=0;
let interval=null;
let time=0;

function format(ms){
  let m=Math.floor(ms/60000);
  let s=Math.floor(ms/1000)%60;
  let d=Math.floor(ms%1000/100);
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}.${d}`;
}

function start(){
  startTime=Date.now()-time;
  interval=setInterval(()=>{
    time=Date.now()-startTime;
    document.getElementById("chrono").textContent=format(time);
  },100);
}

function stop(){
  clearInterval(interval);
}

/* SAVE */
async function save(){
  const pseudo=document.getElementById("pseudo").value||"Anonyme";

  await supabase.from("scores").insert([{
    pseudo:pseudo,
    temps:time/1000
  }]);

  load();
}

/* LOAD */
async function load(){
  const {data}=await supabase
    .from("scores")
    .select("*")
    .order("temps",{ascending:true});

  const table=document.getElementById("table");
  table.innerHTML="";

  data.forEach((d,i)=>{
    table.innerHTML+=`
      <tr>
        <td>${i+1}</td>
        <td>${d.pseudo}</td>
        <td>${format(d.temps*1000)}</td>
      </tr>
    `;
  });
}

load();
</script>

</body>
</html>
